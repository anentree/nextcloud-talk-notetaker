services:
  notetaker:
    build: .
    env_file: .env
    restart: unless-stopped
    shm_size: "1g"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          memory: 2g
    tmpfs:
      - /tmp/notetaker-audio
    volumes:
      - ./notes:/data/notes
